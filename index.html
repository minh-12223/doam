<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Moisture Monitor</title>
    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; }
        #login-box, #dashboard { max-width: 300px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        #dashboard { display: none; border: none; } /* Ẩn dashboard lúc đầu */
        input { width: 90%; padding: 10px; margin-bottom: 10px; }
        button { width: 96%; padding: 10px; cursor: pointer; background: #2196F3; color: white; border: none; border-radius: 5px; }
        h1 { font-size: 24px; }
    </style>
</head>
<body>

    <div id="login-box">
        <h3>Login</h3>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div id="dashboard">
        <h1>Moisture: <span id="val">...</span>%</h1>
        <button onclick="logout()" style="background:#888; margin-top:20px;">Logout</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyBx6ZUHwpJUSlWUt_Y1DhLtaBWC5DI4upo",
  authDomain: "esp32-doam.firebaseapp.com",
  databaseURL: "https://esp32-doam-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "esp32-doam",
  storageBucket: "esp32-doam.firebasestorage.app",
  messagingSenderId: "246499648002",
  appId: "1:246499648002:web:855a8586600c1b7b303d1b"
};

window.login = () => {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;
            firebase.auth().signInWithEmailAndPassword(email, pass)
                .catch(err => alert("Lỗi: " + err.message));
        };
window.logout = () => firebase.auth().signOut();

        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const moistureRef = db.ref('data/moisture');

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById("login-box").style.display = "none";
                document.getElementById("dashboard").style.display = "block";

                moistureRef.on('value', (snapshot) => {
                    document.getElementById("val").innerText = snapshot.val() || 0;
                });
            } else {
                document.getElementById("login-box").style.display = "block";
                document.getElementById("dashboard").style.display = "none";
                document.getElementById("val").innerText = "...";
            }
        });
    </script>
</body>
</html>
